name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest

  tracker:
    # Independent of the Python job: a tracker change doesn't gate Python CI and
    # vice-versa. The Worker tests are offline (Miniflare) and read the committed
    # board.json fixture, never the live pipeline.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracker
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tracker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
